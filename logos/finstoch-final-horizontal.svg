<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" role="img" aria-labelledby="logo-title">
  <title id="logo-title">FinStoch</title>
  <defs>
    <style>
      .bg { fill: #0F1B33; }
      .grid { stroke: #162744; stroke-width: 0.35; fill: none; }
      .p1 { fill: none; stroke: #4DA8DA; stroke-width: 1.2; stroke-linecap: round; opacity: 0.85; }
      .p2 { fill: none; stroke: #E84855; stroke-width: 1.2; stroke-linecap: round; opacity: 0.75; }
      .p3 { fill: none; stroke: #F4A261; stroke-width: 1.2; stroke-linecap: round; opacity: 0.75; }
      .p4 { fill: none; stroke: #7BE0D6; stroke-width: 1; stroke-linecap: round; opacity: 0.6; }
      .p5 { fill: none; stroke: #A78BFA; stroke-width: 1; stroke-linecap: round; opacity: 0.6; }
      .node { opacity: 0.9; }
      .name-fin { fill: #CBD5E1; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 40px; font-weight: 300; letter-spacing: 1px; }
      .name-stoch { fill: #2EC4B6; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 40px; font-weight: 600; letter-spacing: 1px; }
    </style>
    <linearGradient id="sigma-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2EC4B6"/>
      <stop offset="100%" style="stop-color:#4DA8DA"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect class="bg" x="6" y="6" width="88" height="88" rx="15" ry="15"/>

  <!-- Grid -->
  <g class="grid">
    <line x1="22" y1="6" x2="22" y2="94"/><line x1="38" y1="6" x2="38" y2="94"/>
    <line x1="54" y1="6" x2="54" y2="94"/><line x1="70" y1="6" x2="70" y2="94"/>
    <line x1="86" y1="6" x2="86" y2="94"/>
    <line x1="6" y1="22" x2="94" y2="22"/><line x1="6" y1="38" x2="94" y2="38"/>
    <line x1="6" y1="54" x2="94" y2="54"/><line x1="6" y1="70" x2="94" y2="70"/>
    <line x1="6" y1="86" x2="94" y2="86"/>
  </g>
  <!-- Expected path (dotted) -->
  <path fill="none" stroke="#E8E4E0" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="3.5 3.5" opacity="0.85" d="M14,50 L88,56"/>

  <!-- Paths -->
  <path class="p1" d="M14,50 C22,48 30,42 38,38 C46,34 54,36 62,33 C70,30 78,24 88,20"/>
  <path class="p4" d="M14,50 C22,49 30,46 38,44 C46,42 54,44 62,42 C70,40 78,36 88,33"/>
  <path class="p5" d="M14,50 C22,51 30,48 38,47 C46,46 54,48 62,47 C70,46 78,44 88,42"/>
  <path class="p3" d="M14,50 C22,52 30,56 38,59 C46,62 54,60 62,64 C70,68 78,72 88,76"/>
  <path class="p2" d="M14,50 C22,53 30,58 38,63 C46,68 54,65 62,70 C70,75 78,80 88,84"/>

  <!-- Nodes -->
  <g class="node">
    <circle fill="#E84855" cx="38" cy="38" r="1.8"/>
    <circle fill="#4DA8DA" cx="70" cy="38" r="2.2"/>
    <circle fill="#F4A261" cx="54" cy="70" r="2"/>
    <circle fill="#7BE0D6" cx="70" cy="54" r="1.6"/>
    <circle fill="#A78BFA" cx="38" cy="70" r="1.6"/>
    <circle fill="#2EC4B6" cx="22" cy="38" r="1.4"/>
    <circle fill="#E84855" cx="86" cy="70" r="1.8"/>
    <circle fill="#4DA8DA" cx="54" cy="38" r="1.4"/>
  </g>

  <!-- Text -->
  <text x="112" y="61">
    <tspan class="name-fin">Fin</tspan><tspan class="name-stoch">Stoch</tspan>
  </text>
</svg>
