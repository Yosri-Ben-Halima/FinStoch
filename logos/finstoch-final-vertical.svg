<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 175" role="img" aria-labelledby="logo-title">
  <title id="logo-title">FinStoch</title>
  <defs>
    <style>
      .bg { fill: #0F1B33; }
      .grid { stroke: #162744; stroke-width: 0.4; fill: none; }
      .p1 { fill: none; stroke: #4DA8DA; stroke-width: 1.4; stroke-linecap: round; opacity: 0.85; }
      .p2 { fill: none; stroke: #E84855; stroke-width: 1.4; stroke-linecap: round; opacity: 0.75; }
      .p3 { fill: none; stroke: #F4A261; stroke-width: 1.4; stroke-linecap: round; opacity: 0.75; }
      .p4 { fill: none; stroke: #7BE0D6; stroke-width: 1.2; stroke-linecap: round; opacity: 0.6; }
      .p5 { fill: none; stroke: #A78BFA; stroke-width: 1.2; stroke-linecap: round; opacity: 0.6; }
      .node { opacity: 0.9; }
      .name-fin { fill: #CBD5E1; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 32px; font-weight: 300; letter-spacing: 1px; }
      .name-stoch { fill: #2EC4B6; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 32px; font-weight: 600; letter-spacing: 1px; }
    </style>
    <linearGradient id="sigma-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2EC4B6"/>
      <stop offset="100%" style="stop-color:#4DA8DA"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect class="bg" x="10" y="6" width="120" height="112" rx="18" ry="18"/>

  <!-- Grid -->
  <g class="grid">
    <line x1="30" y1="6" x2="30" y2="118"/>
    <line x1="50" y1="6" x2="50" y2="118"/>
    <line x1="70" y1="6" x2="70" y2="118"/>
    <line x1="90" y1="6" x2="90" y2="118"/>
    <line x1="110" y1="6" x2="110" y2="118"/>
    <line x1="10" y1="26" x2="130" y2="26"/>
    <line x1="10" y1="46" x2="130" y2="46"/>
    <line x1="10" y1="66" x2="130" y2="66"/>
    <line x1="10" y1="86" x2="130" y2="86"/>
    <line x1="10" y1="106" x2="130" y2="106"/>
  </g>
  <!-- Expected path (dotted) -->
  <path fill="none" stroke="#E8E4E0" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="4 4" opacity="0.85" d="M20,62 L122,68"/>

  <!-- Paths -->
  <path class="p1" d="M20,62 C32,60 44,52 56,48 C68,44 80,46 88,42 C96,38 108,30 122,24"/>
  <path class="p4" d="M20,62 C32,61 44,56 56,54 C68,52 80,55 88,52 C96,49 108,44 122,40"/>
  <path class="p5" d="M20,62 C32,63 44,60 56,58 C68,56 80,59 88,58 C96,57 108,54 122,52"/>
  <path class="p3" d="M20,62 C32,64 44,68 56,72 C68,76 80,74 88,78 C96,82 108,88 122,92"/>
  <path class="p2" d="M20,62 C32,65 44,72 56,78 C68,84 80,80 88,86 C96,92 108,98 122,102"/>

  <!-- Nodes -->
  <g class="node">
    <circle fill="#E84855" cx="50" cy="46" r="2.2"/>
    <circle fill="#4DA8DA" cx="90" cy="46" r="2.8"/>
    <circle fill="#F4A261" cx="70" cy="86" r="2.5"/>
    <circle fill="#7BE0D6" cx="90" cy="66" r="2"/>
    <circle fill="#A78BFA" cx="50" cy="86" r="2"/>
    <circle fill="#2EC4B6" cx="30" cy="46" r="1.8"/>
    <circle fill="#E84855" cx="110" cy="86" r="2.2"/>
    <circle fill="#4DA8DA" cx="70" cy="46" r="1.8"/>
  </g>

  <!-- Text -->
  <text text-anchor="middle" x="70" y="158">
    <tspan class="name-fin">Fin</tspan><tspan class="name-stoch">Stoch</tspan>
  </text>
</svg>
